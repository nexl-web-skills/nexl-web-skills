name: community-check

on:
  pull_request:
    paths:
      - 'showcase/**'
      - 'templates/**'

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate community entries
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');
            const changed = execSync('git diff --name-only origin/${{ github.base_ref }}...HEAD')
              .toString().split('\n');

            let ok = true;
            let msg = '## 🤖 community-check 结果\n\n';

            // ---- showcase 案例校验 ----
            const showcaseFiles = changed.filter(f => f.startsWith('showcase/') && f.endsWith('.md')
              && !f.includes('_template') && f !== 'showcase/README.md');
            if (showcaseFiles.length) {
              msg += '### showcase 案例\n';
              for (const f of showcaseFiles) {
                const c = fs.readFileSync(f, 'utf8');
                const need = ['brand:', 'platform:', 'tagline:', '激活语', 'nexl-web-skills'];
                const miss = need.filter(k => !c.includes(k));
                if (miss.length) { ok = false; msg += `- ❌ \`${f}\` 缺少: ${miss.join(', ')}\n`; }
                else { msg += `- ✅ \`${f}\` 通过\n`; }
              }
            }

            // ---- templates 模板校验 ----
            const tplFiles = changed.filter(f => f.startsWith('templates/') && f.endsWith('template.json')
              && !f.includes('_template/'));
            if (tplFiles.length) {
              msg += '\n### templates 模板\n';
              const required = ['id','name','author','category','platforms','ratings','license'];
              for (const f of tplFiles) {
                try {
                  const j = JSON.parse(fs.readFileSync(f, 'utf8'));
                  const miss = required.filter(k => !(k in j));
                  const ratingKeys = ['quality','cost_efficiency','stability'];
                  const missR = ratingKeys.filter(k => !(k in (j.ratings||{})));
                  if (miss.length || missR.length) {
                    ok = false;
                    msg += `- ❌ \`${f}\` 缺字段: ${[...miss, ...missR.map(r=>'ratings.'+r)].join(', ')}\n`;
                  } else { msg += `- ✅ \`${f}\` 通过（${j.id} · ${j.category}）\n`; }
                } catch(e) {
                  ok = false; msg += `- ❌ \`${f}\` JSON 解析失败: ${e.message}\n`;
                }
              }
            }

            if (!showcaseFiles.length && !tplFiles.length) {
              msg += '（本 PR 无 showcase / templates 变更，跳过）\n';
            }

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: msg
            });
            if (!ok) core.setFailed('格式校验未通过，请对照 _template 补全');
