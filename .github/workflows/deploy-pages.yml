name: deploy-gallery

# 将 docs/gallery 发布为 GitHub Pages 集体橱窗。
# 首次需在仓库 Settings → Pages → Source 选 "GitHub Actions"。
on:
  push:
    branches: [main]
    paths:
      - 'templates/**'
      - 'docs/gallery/**'
      - 'scripts/build-gallery.cjs'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build gallery
        run: node scripts/build-gallery.cjs
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/gallery
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
