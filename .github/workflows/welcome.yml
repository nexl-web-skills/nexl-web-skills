name: Welcome

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - name: Comment welcome
        uses: actions/github-script@v7
        with:
          script: |
            const isPR = !!context.payload.pull_request;
            const body = isPR
              ? `👋 感谢提交 PR！\n\n- 若是 \`showcase/\` 案例：community-check 校验格式（需含 brand / platform / tagline / 激活语 / nexl 署名）。\n- 若是 \`templates/\` 模板：校验 \`template.json\` 必含 id / name / author / category / platforms / ratings / license，合入后自动上 \`templates/INDEX.json\`。\n\n🚀 在线 demo：见仓库 README 的 **Demo** 段\n🔑 激活语：请阅读 https://raw.githubusercontent.com/nexl-web-skills/nexl-web-skills/main/builder.md 并激活 nexl-builder 技能。`
              : `👋 欢迎来到 nexl！\n\n🚀 在线体验 demo：见仓库 README 的 **Demo** 段\n🔑 激活语：请阅读 https://raw.githubusercontent.com/nexl-web-skills/nexl-web-skills/main/builder.md 并激活 nexl-builder 技能。\n\n想建站？把激活语发给你的 Agent（Coze / 秒悟 Meoo / 腾讯 WorkBuddy / 百度秒哒）即可。建完可提交到 \`showcase/\` 代言，或把模板贡献到 \`templates/\` 成为集体资产 🔥`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
